<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detalle de incidencia</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/styles.css}" rel="stylesheet">
</head>
<body>
<div class="dashboard-shell">
    <div class="container py-4 py-md-5">

        <section class="dashboard-header mb-4">
            <div class="dashboard-header__content">
                <div>
                    <span class="section-kicker">Detalle</span>
                    <h1 class="dashboard-title">Incidencia <span th:text="'#' + ${incident.id}">#1</span></h1>
                    <p class="dashboard-subtitle">Vista completa de la incidencia seleccionada.</p>
                </div>

                <div class="dashboard-header__actions action-group">
                    <a th:href="@{/incidents}" class="btn btn-outline-secondary btn-lg">Volver al panel</a>
                </div>
            </div>
        </section>

        <section class="detail-layout">
            <article class="detail-main-card">
                <div class="detail-main-card__header">
                    <div>
                        <p class="detail-label mb-2">Título</p>
                        <h2 class="detail-title" th:text="${incident.title}">Título incidencia</h2>
                    </div>

                    <div class="detail-badges">
                        <span th:if="${incident.priority == 'HIGH'}"
                              class="custom-badge badge-priority-high"
                              th:text="${incident.priority}"></span>

                        <span th:if="${incident.priority == 'MEDIUM'}"
                              class="custom-badge badge-priority-medium"
                              th:text="${incident.priority}"></span>

                        <span th:if="${incident.priority == 'LOW'}"
                              class="custom-badge badge-priority-low"
                              th:text="${incident.priority}"></span>

                        <span th:if="${incident.status == 'OPEN'}"
                              class="custom-badge badge-status-open"
                              th:text="${incident.status}"></span>

                        <span th:if="${incident.status == 'IN_PROGRESS'}"
                              class="custom-badge badge-status-progress"
                              th:text="${incident.status}"></span>

                        <span th:if="${incident.status == 'CLOSED'}"
                              class="custom-badge badge-status-closed"
                              th:text="${incident.status}"></span>
                    </div>
                </div>

                <div class="detail-section">
                    <p class="detail-label">Descripción</p>
                    <div class="detail-description" th:text="${incident.description}">
                        Descripción de la incidencia
                    </div>
                </div>
            </article>

            <aside class="detail-side-card">
                <h3 class="detail-side-card__title">Información general</h3>

                <div class="detail-info-list">
                    <div class="detail-info-row">
                        <span class="detail-info-key">ID</span>
                        <span class="detail-info-value" th:text="'#' + ${incident.id}">#1</span>
                    </div>

                    <div class="detail-info-row">
                        <span class="detail-info-key">Responsable</span>
                        <span class="detail-info-value" th:text="${incident.assignee}">Giovanna</span>
                    </div>

                    <div class="detail-info-row">
                        <span class="detail-info-key">Fecha de creación</span>
                        <span class="detail-info-value" th:text="${incident.createdDate}">2026-03-13</span>
                    </div>

                    <div class="detail-info-row">
                        <span class="detail-info-key">Estado</span>
                        <span class="detail-info-value" th:text="${incident.status}">OPEN</span>
                    </div>

                    <div class="detail-info-row">
                        <span class="detail-info-key">Prioridad</span>
                        <span class="detail-info-value" th:text="${incident.priority}">HIGH</span>
                    </div>
                </div>

                <div class="detail-side-actions">
                    <a th:href="@{/incidents}" class="btn btn-outline-secondary w-100">
                        Volver al listado
                    </a>
                </div>
            </aside>
        </section>

    </div>
</div>
</body>
</html>
